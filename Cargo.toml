[workspace]
members = ["spdk-core", "backend-blindbit-v1", "spdk-wallet", "silentpayments"]
resolver = "3"

[workspace.dependencies]
# Internal workspace crates
spdk-core = { path = "spdk-core" }
silentpayments = { path = "silentpayments" }
backend-blindbit-v1 = { path = "backend-blindbit-v1"}

# Core dependencies - shared across crates
anyhow = "1.0"
async-trait = "0.1"
base64 = "0.22"
bdk_coin_select = "0.4.0"
bech32 = "0.9"
# bdk_coin_select = "0.4.0"
bimap = "0.6"
bitcoin = { version = "0.32.8", features = ["serde", "rand", "base64"] }
bitcoin_hashes = "0.13.0"
dnssec-prover = "0.1"
futures = "0.3"
hex = { version = "0.4.3", features = ["serde"] }
hmac = "0.12"
log = "0.4"
reqwest = { version = "0.12.4", features = [
  "json",
  "rustls-tls",
  "gzip",
], default-features = false }
psbt-v2 = { git = "https://github.com/tcharding/rust-psbt.git", branch = "master", features = ["silent-payments"] }
rayon = "1.10.0"
rust-dleq = { git = "https://github.com/macgyver13/rust-dleq.git", branch = "master", default-features = false }
secp256k1 = { version = "0.29.0", features = ["rand"] }
serde = { version = "1.0.188", features = ["derive"] }
serde_json = "1.0.107"
sha2 = "0.10"
tempfile = "3.8"
thiserror = "1.0"
tokio = { version = "1.48.0", features = ["rt"], default-features = false }


[workspace.package]
repository = "https://github.com/cygnet3/spdk"
authors = ["cygnet <cygnet3@proton.me>"]
license = "MIT"
